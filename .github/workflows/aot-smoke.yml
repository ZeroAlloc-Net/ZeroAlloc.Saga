name: aot-smoke
on:
  push: { branches: [main] }
  pull_request: { branches: [main] }

jobs:
  aot-smoke:
    name: publish + run AotSmoke (linux-x64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            10.0.x
      # Restore the whole solution so the saga generator + its analyzer
      # ProjectReference resolve before AotSmoke is published.
      - name: Restore solution
        run: dotnet restore ZeroAlloc.Saga.slnx
      # Publish AotSmoke with native AOT enabled. PublishAot=true is set in
      # AotSmoke.csproj itself, NOT on the command line — the command-line
      # form propagates to ProjectReference dependencies and makes the
      # netstandard2.0 generator csproj try to AOT-compile (NETSDK1207).
      # Any trim warnings will fail the build because the runtime project
      # enables EnableTrimAnalyzer + AOT analysers; we explicitly do not
      # suppress.
      - name: Publish AotSmoke
        run: dotnet publish samples/AotSmoke/AotSmoke.csproj -c Release -o aot-out
      # Run the AOT-published binary and assert exit code 0 (saga reaches
      # Completed and is removed from the store).
      - name: Run AotSmoke
        run: ./aot-out/AotSmoke

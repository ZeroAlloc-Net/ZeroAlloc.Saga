name: aot-smoke
on:
  push: { branches: [main] }
  pull_request: { branches: [main] }

jobs:
  aot-smoke:
    name: publish + run AotSmoke (linux-x64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            8.0.x
            10.0.x
      # Restore the whole solution so the saga generator + its analyzer
      # ProjectReference resolve before AotSmoke is published.
      - name: Restore solution
        run: dotnet restore ZeroAlloc.Saga.slnx
      # Publish AotSmoke with native AOT enabled. PublishAot=true is set in
      # AotSmoke.csproj itself, NOT on the command line — the command-line
      # form propagates to ProjectReference dependencies and makes the
      # netstandard2.0 generator csproj try to AOT-compile (NETSDK1207).
      # Any trim warnings will fail the build because the runtime project
      # enables EnableTrimAnalyzer + AOT analysers; we explicitly do not
      # suppress.
      - name: Publish AotSmoke
        run: dotnet publish samples/AotSmoke/AotSmoke.csproj -c Release -o aot-out
      # Run the AOT-published binary and assert exit code 0 (saga reaches
      # Completed and is removed from the store).
      - name: Run AotSmoke
        run: ./aot-out/AotSmoke

  aot-smoke-efcore:
    name: build + run AotSmokeEfCore (linux-x64, EfCore backend)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            8.0.x
            10.0.x
      - name: Restore solution
        run: dotnet restore ZeroAlloc.Saga.slnx
      # AotSmokeEfCore.csproj enables IsAotCompatible=true +
      # EnableTrimAnalyzer + EnableSingleFileAnalyzer so AOT-hostile
      # patterns surface as build errors here. PublishAot=true is NOT set
      # because EF Core 9.0's NativeAOT story still requires precompiled
      # queries that don't yet cover the dynamic LINQ expressions inside
      # ZeroAlloc.Saga.EfCore's store. A truly-AOT-published binary today
      # would throw "Query wasn't precompiled and dynamic code isn't
      # supported (NativeAOT)" at runtime; once EF Core's AOT support
      # matures (post-10.0) the publish + run pattern from the InMemory
      # job above is the target shape here too.
      #
      # In the meantime this job still adds value: the build runs all
      # AOT/trim analyzers, and the runtime smoke proves the EfCore
      # backend wires correctly with the saga generator's emitted
      # handlers (forward path + RowVersion rotation + row removal on
      # Completed).
      - name: Build AotSmokeEfCore
        run: dotnet build samples/AotSmokeEfCore/AotSmokeEfCore.csproj -c Release
      - name: Run AotSmokeEfCore
        run: dotnet run --project samples/AotSmokeEfCore/AotSmokeEfCore.csproj -c Release --no-build

  aot-smoke-outbox:
    name: publish + run AotSmokeOutbox (linux-x64, outbox bridge)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            8.0.x
            10.0.x
      - name: Restore solution
        run: dotnet restore ZeroAlloc.Saga.slnx
      # Empirically verify the Phase 3a AOT-rooting contract: the saga
      # generator's [DynamicDependency] on MediatorSagaCommandDispatcher's
      # constructor must keep ZeroAlloc.Saga.Generated.SagaCommandRegistry
      # alive after trimming so SagaOutboxBuilderExtensions.CreateRegistryDispatcher
      # can locate it reflectively. PublishAot=true is set in
      # AotSmokeOutbox.csproj itself (not on the command line — same reasoning
      # as AotSmoke). The published binary asserts: saga step → outbox enqueue
      # → poller drain → mediator dispatch round-trip succeeds. Exit code 0
      # is the load-bearing assertion — without the [DynamicDependency] the
      # registry would be trimmed and the first poll cycle would throw
      # "could not locate the generator-emitted SagaCommandRegistry".
      - name: Publish AotSmokeOutbox
        run: dotnet publish samples/AotSmokeOutbox/AotSmokeOutbox.csproj -c Release -o aot-out-outbox
      - name: Run AotSmokeOutbox
        run: ./aot-out-outbox/AotSmokeOutbox

  resilience-sample:
    name: build + run ResilienceSample (linux-x64, JIT)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            8.0.x
            10.0.x
      - name: Restore solution
        run: dotnet restore ZeroAlloc.Saga.slnx
      # ResilienceSample is JIT-only — it demonstrates the Saga.Resilience bridge's
      # retry policy recovering from transient receiver failures. The bridge itself
      # has no AOT-specific concerns (pure DI-side decorator with hand-rolled
      # ZeroAlloc.Resilience policy invocations), so a JIT smoke is sufficient. If
      # AOT-specific verification ever becomes useful, mirror the AotSmokeOutbox
      # publish-and-run pattern here.
      - name: Build ResilienceSample
        run: dotnet build samples/ResilienceSample/ResilienceSample.csproj -c Release
      - name: Run ResilienceSample
        run: dotnet run --project samples/ResilienceSample/ResilienceSample.csproj -c Release --no-build

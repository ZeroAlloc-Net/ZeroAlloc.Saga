name: build
on:
  push: { branches: [main] }
  pull_request: { branches: [main] }
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            8.0.x
            10.0.x
      - run: dotnet restore ZeroAlloc.Saga.slnx
      - run: dotnet build ZeroAlloc.Saga.slnx --configuration Release --no-restore
      - run: dotnet test ZeroAlloc.Saga.slnx --configuration Release --no-build --verbosity normal

  api-compat:
    uses: ZeroAlloc-Net/.github/.github/workflows/api-compat.yml@main
    with:
      package-id: ZeroAlloc.Saga
      csproj-path: src/ZeroAlloc.Saga/ZeroAlloc.Saga.csproj
